<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - RPG Life</title>

  <style>
    /* =========================
       ROOT (SAKURA THEME)
    ========================== */
    :root {
      --clr-primary: #f472b6;
      --clr-bg: linear-gradient(to bottom, #fff1f8, #ffe4ec);
      --clr-glass: rgba(255, 255, 255, 0.75);
      --clr-text-main: #4a044e;
      --clr-text-muted: #9d174d;
      --clr-border: rgba(255,255,255,0.4);

      --radius: 16px;
      --shadow: 0 10px 30px rgba(244, 114, 182, 0.2);
    }

    /* =========================
       BODY
    ========================== */
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--clr-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--clr-text-main);
    }

    /* =========================
       CONTAINER
    ========================== */
    .form-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;

      background: var(--clr-glass);
      backdrop-filter: blur(12px);

      border-radius: var(--radius);
      border: 1px solid var(--clr-border);
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--clr-primary);
    }

    /* =========================
       FORM
    ========================== */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      color: var(--clr-text-muted);
    }

    input {
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--clr-border);
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--clr-primary);
    }

    /* =========================
       INFO
    ========================== */
    .info-text {
      font-size: 0.75rem;
      color: var(--clr-text-muted);
      margin-top: 0.5rem;
    }

    .info-text a {
      color: var(--clr-primary);
      text-decoration: none;
    }

    /* =========================
       BUTTON
    ========================== */
    button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 1rem;

      border: none;
      border-radius: 10px;

      background: var(--clr-primary);
      color: white;
      font-weight: bold;

      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    /* =========================
       NAV
    ========================== */
    .auth-nav {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
    }

    .auth-nav a {
      color: var(--clr-primary);
      text-decoration: none;
    }
  </style>
</head>

<body>

  <main class="form-container">
    <h1>Sign In</h1>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password"/>
      </div>

      <p class="info-text">
        Data login diambil dari local storage. 
        <a href="#" onclick="showInfo(event)">Pelajari lebih lanjut</a>
      </p>

      <button type="submit">Masuk</button>

    </form>

    <div class="auth-nav">
      Belum punya akun? 
      <a href="./register.html">Register</a>
    </div>
  </main>

  <script>
    /* =========================
       LOGIN SYSTEM (MULTI ACCOUNT)
    ========================== */
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const accounts = JSON.parse(localStorage.getItem("accounts")) || [];

      const user = accounts.find(acc => 
        acc.username === username && acc.password === password
      );

      if (!user) {
        alert("Username atau password salah!");
        return;
      }

      /* =========================
         SET CURRENT USER
      ========================== */
      localStorage.setItem("currentUser", JSON.stringify(user));

      alert("Login berhasil! 🌸");

      /* redirect ke home */
      window.location.href = "../home.html";
    });

    /* =========================
       INFO
    ========================== */
    function showInfo(e) {
      e.preventDefault();
      alert("Data disimpan di browser (localStorage) sebagai simulasi sistem akun.");
    }
  </script>

</body>
</html>
